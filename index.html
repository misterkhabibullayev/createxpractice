<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Creat Ex</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header
            class="w-full bg-transparent absolute top-0 left-0"
            id="headerMain"
        ></header>

        <main>
            <section
                class="pt-[100px] pb-[80px] bg-[url(Image/HomePagePhoto/background.svg)]"
                id="heroSection"
            >
                
            </section>

            <section class="relative" id="whoweare">
                
                <div class="absolute top-[10%] left-0">
                    <img src="./Image/HomePagePhoto/dots.svg" alt="dots icon" />
                </div>
                <div class="absolute bottom-[5%] right-0">
                    <img
                        src="./Image/HomePagePhoto/circles.svg"
                        alt="sircles icon"
                    />
                </div>
            </section>

            <section id="featuredCoursesSection">

            </section>

            <section id="ourBenefits" class="pt-[180px] pb-[120px]">

            </section>

            <section id="ourEvents" class="py-[80px] bg-[#FFDBD5] relative overflow-hidden">
                
            </section>
        </main>

        <script type="module" src="index.js"></script>
    </body>
</html>
