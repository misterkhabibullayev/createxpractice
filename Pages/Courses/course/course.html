<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Course</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
            rel="stylesheet"
        />

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        screens: {
                            desktop992: "992px",
                        },
                    },
                },
            };
        </script>

        <style>
            body {
                font-family: "Lato", sans-serif;
                padding-bottom: 1000px;
            }
        </style>
    </head>
    <body>
        <!--*************** header ***************  -->

        <header
            class="w-full bg-transparent absolute z-10 top-0 left-0"
            id="headerMain"
        ></header>
        <!--*************** header ***************  -->

        <main>
            <!-- *************** Hero section *************** -->
            <section
                class="bg-[url('../../../Image/HomePagePhoto/backgroundHero.svg')]"
            >
                <div
                    id="hero-container"
                    class="relative container mx-auto px-5 md:px-10 lg:px-20 pt-[70px]"
                >
                    <p id="hero-badge"></p>
                    <p id="hero-title"></p>
                </div>
            </section>
            <!-- *************** Hero section *************** -->

            <!-- *************** About the course section *************** -->
            <section>
                <div class="container mx-auto px-5 md:px-10 pt-[96px]">
                    <div id="aboutTheCourse"></div>
                </div>
            </section>
            <!-- *************** About the course section *************** -->

            <!-- *************** EARLY BIRDS section *************** -->
            <section>
                <div class="container mx-auto px-5 md:px-10 lg:px-20 mt-[96px]">
                    <div
                        class="bg-[#fab09c] px-[15px] py-12 rounded"
                        id="early-birds"
                    ></div>
                </div>
            </section>
            <!-- *************** EARLY BIRDS section *************** -->
        </main>

        <script type="module" src="course.js"></script>
    </body>
</html>
