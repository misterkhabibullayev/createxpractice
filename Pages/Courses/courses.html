<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Courses</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
            rel="stylesheet"
        />

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        screens: {
                            desktop992: "992px",
                        },
                    },
                },
            };
        </script>

        <style>
            body {
                font-family: "Lato", sans-serif;
            }
        </style>
    </head>
    <body>
        <div>
            <header class="w-full bg-transparent absolute top-0 left-0">
                <div
                    class="container mx-auto px-5 md:px-10 lg:px-20 flex justify-between items-center py-5"
                >
                    <div class="flex items-center gap-7 md:gap-10">
                        <div class="">
                            <a href="../../index.html">
                                <img
                                    src="../../Image/HomePagePhoto/logo.svg"
                                    alt="logo image"
                                />
                            </a>
                        </div>
                        <nav class="hidden lg:flex items-center gap-4 md:gap-8">
                            <a
                                href="../../Pages/About/about.html"
                                class="font-[Lato] font-bold text-[16px] leading-[160%] text-[#424551] hover:text-[#FF3F3A] transition-all duration-500"
                                >About Us</a
                            >
                            <a
                                href="./Pages/Courses/courses.html"
                                class="font-[Lato] font-bold text-[16px] leading-[160%] text-[#424551] hover:text-[#FF3F3A]"
                                >Courses</a
                            >
                            <a
                                href="./Pages/Events/events.html"
                                class="font-[Lato] font-bold text-[16px] leading-[160%] text-[#424551] hover:text-[#FF3F3A]"
                                >Events</a
                            >
                            <a
                                href="./Pages/Blogs/blogs.html"
                                class="font-[Lato] font-bold text-[16px] leading-[160%] text-[#424551] hover:text-[#FF3F3A]"
                                >Blog</a
                            >
                            <a
                                href="./Pages/Contacts/contacts.html"
                                class="font-[Lato] font-bold text-[16px] leading-[160%] text-[#424551] hover:text-[#FF3F3A]"
                                >Contacts</a
                            >
                        </nav>
                    </div>
                    <div class="flex items-center gap-3 md:gap-4">
                        <a
                            href="./Pages/Contacts/contacts.html"
                            class="font-[Lato] font-bold text-[12px] lg:py-1 leading-8 tracking-[0.5px] text-white bg-gradient-to-r from-[#FF3F3A] to-[#F75E05] px-5 rounded-[4px] hidden sm:inline-block hover:bg-gradient-to-l hover:from-[#F75E05] hover:to-[#FF3F3A]"
                        >
                            Get consultation
                        </a>
                        <a
                            href="#!"
                            class="hidden lg:flex gap-2 items-center font-[Lato] font-bold text-4 leading-[160%] text-gray-800"
                        >
                            <img
                                src="../../Image/HomePagePhoto/Profile.svg"
                                alt="profile icon"
                            />
                            Log in / Register
                        </a>
                        <button class="block lg:hidden">
                            <img
                                src="../../Image/HomePagePhoto/stash--burger-classic-light.svg"
                                alt="burger icon"
                            />
                        </button>
                    </div>
                </div>
            </header>

            <!-- main -->
            <main>
                <!--====================== ONLINE COURSES SECTION ======================-->
                <section
                    class="container mx-auto px-5 md:px-10 lg:px-20 pt-[152px]"
                >
                    <div class="flex flex-col items-center">
                        <h5
                            id="online-course-badge"
                            class="max-[576px]:text-base max-[576px]:font-bold font-bold leading-[150%] text-[#1E212C] uppercase tracking-[1px]"
                        ></h5>

                        <p
                            id="online-course-title"
                            class="mt-2 max-[576px]:text-3xl max-[576px]:font-black font-extrabold lg:text-[2.875rem] leading-[130%] text-[##1E212C]"
                        ></p>
                    </div>

                    <div
                        class="flex items-center justify-between max-[576px]:mt-6 lg:mt-16 mb-14 max-[576px]:flex-col max-[576px]:gap-6 max-[576px]:px-4"
                    >
                        <div
                            id="categories"
                            class="flex items-center gap-3 font-bold leading-[160%] max-[520px]:max-w-[300px] max-[520px]:gap-1 max-w-[475px] text-[#9A9CA5] overflow-x-auto custom-scrollbar pb-2 flex-1 pr-3 xl:overflow-x-hidden xl:max-w-[100%]"
                        ></div>

                        <div
                            class="border max-[576px]:ml-[0px] max-[576px]:w-full border-[#D7DADD] rounded flex items-center ml-[30px] md:ml-[100px]"
                        >
                            <input
                                class="px-4 py-2 outline-none min-w-[100px] md:max-w-[150px] max-[576px]:w-full"
                                type="text"
                                name=""
                                id=""
                                placeholder="Search course..."
                            />

                            <button
                                type="submit"
                                class="group px-5 py-1 rounded-r-lg transition-colors duration-300 ease-in-out hover:border-red-500"
                            >
                                <!-- SVG Search Icon -->
                                <svg
                                    xmlns="http://w3.org"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="2.0"
                                    stroke="currentColor"
                                    class="w-5 h-5 text-gray-500 transition-colors duration-300 ease-in-out group-hover:text-red-600"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- TUTORS PART STARTS - where all people -->
                    <div
                        id="tutors"
                        class="grid grid-cols-1 gap-y-4 gap-x-3 min-[576px]:grid-cols-2 md:grid-cols-2 desktop992:grid-cols-3 lg:grid-cols-3 lg:gap-x-7"
                    ></div>
                </section>
                <!--====================== ONLINE COURSES SECTION ======================-->

                <!-- ====================== TESTIMONIALS SECTION  ====================== -->
                <section class="mt-[120px] bg-[rgb(240,240,240)]">
                    <div
                        class="container mx-auto md:px-10 lg:px-4 flex flex-col items-center justify-center pt-24 xl:px-[15px] xl:pb-12"
                    >
                        <div class="relative w-full">
                            <h6
                                id="testimonials-badge"
                                class="w-full text-center font-bold leading-[150%] tracking-[1px] text-[#1E212C] mb-2"
                            ></h6>

                            <h1
                                id="testimonials-description"
                                class="text-center text-2xl mb-12 pb-2 font-black sm:text-3xl md:text-3xl lg:text-4xl xl:text-5xl leading-[130%] text-[#1E212C]"
                            ></h1>

                            <!-- slider -->

                            <div
                                class="slider-wrapper flex items-center justify-center max-w-full pb-6"
                            >
                                <!-- Next Btn -->
                                <div
                                    id="nextBtn"
                                    class="absolute w-10 h-10 z-50 rounded-full bg-transparent text-black hidden md:-right-[40px] lg:top-[280px] lg:-right-[20px] xl:top-[280px] xl:right-0 md:flex md:items-center md:justify-center cursor-pointer hover:bg-[#FF3F3A] hover:text-white transition-colors duration-300 active:scale-105 select-none"
                                >
                                    <p class="text-2xl">→</p>
                                </div>

                                <!-- circle image -->
                                <div
                                    class="absolute sm:-left-[80px] lg:top-[255px] md:-left-[70px] lg:-left-[30px] xl:top-[255px] xl:-left-[65px]"
                                >
                                    <img
                                        src="../../Image/courses-photo/slider-image/circles.png"
                                        alt=""
                                    />
                                </div>

                                <!-- prev Btn -->
                                <div
                                    id="prevBtn"
                                    class="absolute w-10 h-10 z-50 rounded-full md:flex md:items-center md:justify-center bg-transparent text-black hidden md:-left-[40px] lg:top-[280px] lg:-left-[20px] xl:left-0 xl:top-[280px] cursor-pointer hover:bg-[#FF3F3A] hover:text-white transition-colors duration-300 active:scale-105 select-none"
                                >
                                    <p class="text-2xl">←</p>
                                </div>

                                <div
                                    class="view-port overflow-hidden max-w-[1050px] w-full"
                                >
                                    <div
                                        id="slider-container"
                                        class="flex transition-transform duration-500"
                                    >
                                        <!-- px-6 mb-6 -->
                                    </div>
                                </div>
                            </div>

                            <div
                                class="absolute bottom-[17px] left-[200px] sm:bottom-[20px] sm:left-[275px] md:bottom-[15px] md:left-[300px] lg:bottom-5 lg:left-[450px] xl:left-[600px] flex items-center justify-center lg:align-top gap-3"
                                id="indicatorContainer"
                            ></div>
                        </div>
                    </div>
                </section>

                <!-- ====================== TESTIMONIALS SECTION ====================== -->

                <!-- ====================== Sertificate Section ====================== -->
                <section>
                    <div class="container mx-auto px-4 md:px-6 lg:px-20 pb-12">
                        <div
                            class="max-[575px]:flex max-[575px]:flex-col max-[575px]:px-[0px] flex mt-[120px] py-4"
                        >
                            <div class="sm:px-[15px]">
                                <h6 id="sertificate-badge"></h6>
                                <h1 id="sertificate-title"></h1>
                                <p id="sertificate-description"></p>

                                <div
                                    class="flex items-center gap-10 mb-4"
                                    id="our-collaborations"
                                ></div>
                            </div>

                            <div id="certificaPart"></div>
                        </div>
                    </div>
                </section>

                <!-- ====================== Sertificate Section  ======================-->

                <!-- ====================== Subscribe Section ====================== -->
                <section
                    id="subscribe"
                    class="relative overflow-hidden bg-[url('../../Image/courses-photo/subscribe/background.png')] bg-cover bg-no-repeat bg-center"
                >
                    <div
                        class="container mx-auto px-5 md:px-10 lg:px-20 flex flex-col items-center justify-center pt-[96px]"
                    >
                        <div class="flex flex-col items-center mb-12">
                            <h6
                                class="font-bold leading-[150%] tracking-[1px] uppercase text-[#1E212C] mb-2"
                                id="subscribe-badge"
                            ></h6>
                            <h1
                                class="font-black leading-[130%] text-[#1E212C] max-w-[810px] text-center text-[34px] md:text-[37px] lg:text-[40px] xl:text-5xl pb-2"
                                id="subscribe-title"
                            ></h1>
                        </div>
                        <div id="inputContainer"></div>
                    </div>
                </section>
                <!-- ====================== Subscribe Section ====================== -->
            </main>

            <footer class="bg-[#1E212C]">
                <div class="container mx-auto px-5 md:px-10 lg:px-20 pt-12">
                    <div
                        id="footer-content"
                        class="grid grid-cols-1 items-center justify-items-center gap-y-[50px] sm:grid-cols-2 sm:gap-y-[35px] md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-5"
                    ></div>
                </div>

                <div class="bg-[#292C37] mt-[60px]">
                    <div
                        id="copyrightPart"
                        class="container mx-auto px-5 md:px-10 lg:px-20"
                    ></div>
                </div>
            </footer>
        </div>

        <script type="module" src="courses.js"></script>
    </body>
</html>
